<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Iniciar sesión — Fichas Técnicas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="app-shell">
    <div class="login-card">
      <h1>Iniciar sesión</h1>
      <p>Ingresa tu correo institucional y te enviaremos un enlace de acceso (Magic Link).</p>
      <form id="form-login">
        <label for="login-email">Correo</label>
        <input id="login-email" type="email" required placeholder="nombre@poligran.edu.co" />
        <button id="btn-enviar" type="submit" class="btn">Enviar enlace de acceso</button>
      </form>
      <p id="login-msg" class="login-msg"></p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script type="module" src="../js/views/login.js"></script>
</body>
</html>
