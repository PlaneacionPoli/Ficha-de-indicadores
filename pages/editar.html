<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Editar Ficha Técnica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/ficha-screen.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__brand-icon" aria-hidden="true">📐</span>
        <div>
          <div class="sidebar__brand-title">Fichas Técnicas</div>
          <div class="sidebar__brand-subtitle">Politécnico Grancolombiano</div>
        </div>
      </div>
      <nav class="sidebar__nav">
        <a href="consultar.html" class="sidebar__link">🔍 Consultar</a>
        <a href="crear.html" class="sidebar__link">➕ Crear ficha</a>
      </nav>
      <a href="#" id="btn-salir" class="sidebar__link sidebar__link--danger">🚪 Salir</a>
    </aside>
    <div class="main">
      <header class="topbar">
        <h1 class="topbar__title">Editar Ficha Técnica</h1>
        <div class="topbar__user" id="topbar-user"></div>
      </header>
      <div class="content">
        <div id="panel-editar"></div>

        <section class="ficha__card">
          <div class="ficha__seccion-titulo">Solicitud de Modificación</div>
          <div class="ficha__card-body">
            <div class="ficha__fila ficha__fila--3">
              <div class="ficha__campo">
                <div class="ficha__etiqueta">Comentarios</div>
                <div class="ficha__valor"><textarea id="comentarios-solicitud"></textarea></div>
              </div>
              <div class="ficha__campo">
                <div class="ficha__etiqueta">Fecha de solicitud</div>
                <div class="ficha__valor"><input id="fecha-solicitud" type="date" disabled /></div>
              </div>
              <div class="ficha__campo">
                <div class="ficha__etiqueta">Responsable del cambio</div>
                <div class="ficha__valor">
                  <select id="responsable-cambio"><option value="">Seleccione</option></select>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="ficha-acciones">
          <button id="btn-guardar" class="btn">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script type="module" src="../js/views/editar.js"></script>
</body>
</html>
