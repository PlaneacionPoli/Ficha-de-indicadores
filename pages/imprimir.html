<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Ficha Técnica — Imprimir / PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/ficha-print.css" />
</head>
<body>
  <div class="app-shell">
    <button id="btn-imprimir" class="btn no-imprimir">Guardar como PDF</button>

    <div id="panel-ficha"></div>

    <div class="ficha__seccion-titulo">Metas Históricas</div>
    <table class="tabla-resultados" id="tabla-metas">
      <thead><tr><th>Año</th><th>Meta Frecuencia</th><th>Meta Sem 1</th><th>Meta Sem 2</th></tr></thead>
      <tbody></tbody>
    </table>

    <div class="ficha__seccion-titulo">Control de Cambios</div>
    <table class="tabla-resultados" id="tabla-cambios">
      <thead><tr><th>Fecha</th><th>Usuario</th><th>Campo</th><th>Valor anterior</th><th>Valor nuevo</th><th>Justificación</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="../js/config.js"></script>
  <script type="module" src="../js/views/imprimir.js"></script>
</body>
</html>
